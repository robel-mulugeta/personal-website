  <div class="about__principles" id="typewriter"></div>

  <script>
    document.getElementById('polaroid-flip').addEventListener('click', function () {
      this.querySelector('.polaroid-flipper').classList.toggle('flipped');
    });

    (function () {
      var el = document.getElementById('typewriter');
      var cursor = document.createElement('span');
      cursor.className = 'cursor';
      el.appendChild(cursor);

      // Build the sequence of actions
      // Each action is either { type: 'char' } or { type: 'delete', count: n } or { type: 'pause', ms: n }
      var actions = [];
      var text = 'Always trying to be:\n\n* Kind\n* Honest\n* Curiuous';

      // Type up to the typo
      for (var i = 0; i < text.length; i++) {
        actions.push({ type: 'char', char: text[i] });
      }

      // Pause after the typo
      actions.push({ type: 'pause', ms: 400 });

      // Backspace 'uous' (4 characters)
      for (var d = 0; d < 4; d++) {
        actions.push({ type: 'delete' });
      }

      // Small pause before correction
      actions.push({ type: 'pause', ms: 200 });

      // Type correction + rest
      var correction = 'ous\n* Grateful';
      for (var c = 0; c < correction.length; c++) {
        actions.push({ type: 'char', char: correction[c] });
      }

      var content = '';
      var idx = 0;
      var baseTypeSpeed = 70;
      var deleteSpeed = 50;

      function tick() {
        if (idx >= actions.length) return;

        var action = actions[idx];
        idx++;

        if (action.type === 'char') {
          content += action.char;
          el.textContent = content;
          el.appendChild(cursor);
          var speed = baseTypeSpeed + Math.random() * 40;
          // Slow down slightly after newlines
          if (action.char === '\n') speed += 100;
          setTimeout(tick, speed);
        } else if (action.type === 'delete') {
          content = content.slice(0, -1);
          el.textContent = content;
          el.appendChild(cursor);
          setTimeout(tick, deleteSpeed);
        } else if (action.type === 'pause') {
          setTimeout(tick, action.ms);
        }
      }

      // Start after a brief delay
      setTimeout(tick, 800);
    })();

    // --- Drag-and-drop for principles ---
    (function () {
      function makeDraggable(el) {
        var offsetX = 0, offsetY = 0;
        var dragging = false;

        function onDown(e) {
          e.preventDefault();
          dragging = true;
          el.classList.add('dragging');
          var rect = el.getBoundingClientRect();
          var point = e.touches ? e.touches[0] : e;
          offsetX = point.clientX - rect.left;
          offsetY = point.clientY - rect.top;

          el.style.top = rect.top + 'px';
          el.style.left = rect.left + 'px';
          el.style.bottom = 'auto';
          el.style.right = 'auto';
          el.style.transform = 'none';
        }

        function onMove(e) {
          if (!dragging) return;
          e.preventDefault();
          var point = e.touches ? e.touches[0] : e;
          var x = point.clientX - offsetX;
          var y = point.clientY - offsetY;

          x = Math.max(0, Math.min(x, window.innerWidth - el.offsetWidth));
          y = Math.max(0, Math.min(y, window.innerHeight - el.offsetHeight));

          el.style.left = x + 'px';
          el.style.top = y + 'px';
        }

        function onUp() {
          if (!dragging) return;
          dragging = false;
          el.classList.remove('dragging');
        }

        el.addEventListener('mousedown', onDown);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        el.addEventListener('touchstart', onDown, { passive: false });
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onUp);
      }

      var principles = document.getElementById('typewriter');
      if (principles) makeDraggable(principles);
    })();
  </script>
